<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Machine</title>
  <style>
    body {
        background-color: #f5f5f5;
        font-family: Helvetica;
        color: #4A6644;
        margin: 0;
        padding: 0;
    }

    center {
        background-color: #ECE3D2;
        width: 40%;
        margin: 40px auto;
        padding: 30px;
        border-radius: 15px;
    }

    h1 {
        color: #C66F80;
    }

    h3 {
        color: #9FAA74;
    }

    input {
        padding: 8px;
        border: 2px solid #9FAA74;
    }

    button {
        background-color: #C66F80;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
    }

    p {
        margin-top: 10px;
        font-weight: bold;
    }

    #demo2, #demo3, #demo4 {
        background-color: #F1C8CB;
        padding: 8px;
        border-radius: 6px;
        margin-top: 5px;
        display: inline-block;
        min-width: 150px;
    }
</style>
</head>

<body bgcolor="#00ffff">
    <center>
        <h1>SPTecher's Machine</h1>

        <h3>Digite um número decimal:</h3>
        <input id="demo1" type="text" placeholder="Ex: 42">
        <br><br>

        <button onclick="converter()">Converter</button>

        <h3>Resultados:</h3>
        <p>Octal:
        <div id="demo2"></div>
        </p>
        <p>Hexadecimal:
        <div id="demo3"></div>
        </p>
        <p>Binário:
        <div id="demo4"></div>
        </p>
    </center>

    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = decimal.toString(8);
            demo3.innerHTML = decimal.toString(16);
            demo4.innerHTML = decimal.toString(2);
        }
    </script>
</body>

</html>
