<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Bases</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f3f3f3;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        color: #c45a73;
    }

    .grade {
        display: grid;
        gap: 30px;
        padding: 40px;
        justify-items: center;
    }

    .container {
        background-color: #e9dfcf;
        padding: 20px;
        border-radius: 15px;
        width: 250px;
    }

    .container-inferior {
        grid-column: span 3;
        display: flex;
        justify-content: center;
    }

    h3 {
        color: #8c9a6a;
    }

    input {
        width: 80%;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #8c9a6a;
    }

    button {
        margin-top: 10px;
        background-color: #c45a73;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;

    }

    p {
        font-weight: bold;
        margin: 8px 0;
    }

    span {
        display: block;
        background-color: #e8b7be;
        padding: 8px;
        border-radius: 8px;
        margin-top: 5px;
    }
</style>
</head>

<body>

<h1>Conversor de Bases</h1>

<div class="grade">

    <div class="container">
        <h3>Octal</h3>
        <input id="input_octal" type="text"><br>
        <button onclick="converterOctal()">Converter</button>

        <p>Decimal:<span id="octal1"></span></p>
        <p>Binário:<span id="octal2"></span></p>
        <p>Hexadecimal:<span id="octal3"></span></p>
    </div>

    <div class="container">
        <h3>Decimal</h3>
        <input id="input_decimal" type="text"><br>
        <button onclick="converterDecimal()">Converter</button>

        <p>Octal:<span id="dec2"></span></p>
        <p>Binário:<span id="dec1"></span></p>
        <p>Hexadecimal:<span id="dec3"></span></p>
    </div>

    <div class="container">
        <h3>Hexadecimal</h3>
        <input id="input_hexa" type="text"><br>
        <button onclick="converterHexadecimal()">Converter</button>

        <p>Decimal:<span id="hexa1"></span></p>
        <p>Binário:<span id="hexa2"></span></p>
        <p>Octal:<span id="hexa3"></span></p>
    </div>

    <div class="container-inferior">
        <div class="container">
            <h3>Binário</h3>
            <input id="input_binario" type="text"><br>
            <button onclick="converterBinario()">Converter</button>

            <p>Decimal:<span id="bi1"></span></p>
            <p>Octal:<span id="bi2"></span></p>
            <p>Hexadecimal:<span id="bi3"></span></p>
        </div>
    </div>

</div>

<script>
function converterDecimal() {
    let decimal = Number(input_decimal.value);
    dec1.innerHTML = decimal.toString(2);
    dec2.innerHTML = decimal.toString(8);
    dec3.innerHTML = decimal.toString(16).toUpperCase();
}

function converterBinario() {
    let binario = parseInt(input_binario.value, 2);
    bi1.innerHTML = binario;
    bi2.innerHTML = binario.toString(8);
    bi3.innerHTML = binario.toString(16).toUpperCase();
}

function converterOctal() {
    let octal = parseInt(input_octal.value, 8);
    octal1.innerHTML = octal;
    octal2.innerHTML = octal.toString(2);
    octal3.innerHTML = octal.toString(16).toUpperCase();
}

function converterHexadecimal() {
    let hexadecimal = parseInt(input_hexa.value, 16);
    hexa1.innerHTML = hexadecimal;
    hexa2.innerHTML = hexadecimal.toString(2);
    hexa3.innerHTML = hexadecimal.toString(8);
}
</script>

</body>
</html>
